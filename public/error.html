<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeBook — Error</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body class="page-inner page-center">

<nav class="navbar">
    <div class="nav-brand">
        <span class="brand-icon">◈</span>
        <span class="brand-name">GradeBook</span>
    </div>
    <div class="nav-links">
        <a href="/" class="nav-link">Inicio</a>
        <a href="/listar" class="nav-link">Estudiantes</a>
        <a href="/estadisticas" class="nav-link">Estadísticas</a>
    </div>
</nav>

<div class="error-box">
    <div class="error-icon">⚠️</div>
    <h2 class="error-title">Datos inválidos</h2>
    <p class="error-msg">Las notas deben estar entre <strong>1.0</strong> y <strong>5.0</strong>, y el nombre no puede estar vacío.</p>
    <a href="/" class="btn-primary" style="text-decoration:none; display:inline-flex; align-items:center; gap:8px;">
        <span>Volver al formulario</span> <span>→</span>
    </a>
</div>

</body>
</html>
